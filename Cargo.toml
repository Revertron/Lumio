[package]
name = "lumio"
version = "0.1.0"
edition = "2018"
authors = ["Revertron <lumio@revertron.com>"]

[dependencies]
quick-xml = "0.38.3"
downcast-rs = "1.2.0"
speedy2d = "2.1.0"
rand = "0.8.5"

[dev-dependencies]
include_dir = "0.7"

[profile.release]
opt-level = 3
lto = true
strip = true  # Automatically strip symbols from the binary.